function fmtKRW(n) {
  if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(2) + '억';
  if (Math.abs(n) >= 10000) return Math.round(n / 10000).toLocaleString() + '만';
  return Math.round(n).toLocaleString();
}

function gaussian() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function stageForYear(year) {
  if (year <= 2029) return 'stage1Target';
  if (year <= 2032) return 'stage2Target';
  return 'stage3Target';
}

function runMonteCarlo(categories, totalAmount, numSims = 1500) {
  const validCategories = categories.filter(c => c.name !== '총합' && c.name !== '합계');
  const finals = [];
  
  for (let s = 0; s < numSims; s++) {
    let v = totalAmount;
    for (let year = 2026; year <= 2035; year++) {
      const stageKey = stageForYear(year);
      let nextV = 0;
      validCategories.forEach(cat => {
        const weight = cat[stageKey] || 0;
        const alloc = v * weight;
        const params = ASSUMPTIONS[cat.name] || { ret: 0.05, vol: 0.1 };
        const yearReturn = params.ret + params.vol * gaussian();
        nextV += alloc * (1 + Math.max(yearReturn, -0.9));
      });
      v = nextV;
    }
    finals.push(v);
  }
  finals.sort((a, b) => a - b);
  const p = (q) => finals[Math.floor(q * (finals.length - 1))];
  const min = finals[0], max = finals[finals.length - 1];
  const bins = 14;
  const step = (max - min) / bins || 1;
  const hist = Array.from({ length: bins }, (_, i) => ({ range: fmtKRW(min + i * step), count: 0 }));
  finals.forEach(v => {
    let idx = Math.min(bins - 1, Math.floor((v - min) / step));
    hist[idx].count += 1;
  });
  return {
    p5: p(0.05), p25: p(0.25), p50: p(0.5), p75: p(0.75), p95: p(0.95),
    mean: finals.reduce((s, x) => s + x, 0) / finals.length,
    hist,
  };
}

}

  function fetchData() {
    setLoading(true);
    setError('');

    const callbackName = 'wealthDashboardCb_' + Date.now();
    
    const timeoutId = setTimeout(() => {
      cleanup();
      setError('구글 시트 응답 지연으로 안전 모드(데모 데이터)로 진입했습니다.');
      setLoading(false);
    }, 8000);

    function cleanup() {
      clearTimeout(timeoutId);
      delete window[callbackName];
      const el = document.getElementById(callbackName);
      if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    window[callbackName] = (json) => {
      cleanup();
      if (json && json.stockHoldings && json.investPlan) {
        setData(json);
      } else {
        setError('전달된 데이터 형식이 올바르지 않습니다.');
      }
      setLoading(false);
    };

    try {
      const sep = DEFAULT__URL.includes('?') ? '&' : '?';
      const script = document.createElement('script');
      script.id = callbackName;
      script.src = DEFAULT__URL + sep + 'callback=' + callbackName;
      script.onerror = () => {
        cleanup();
        setError(' 연동에 실패했습니다. (네트워크나 스크립트 주소 확인 필요)');
        setLoading(false);
      };
      document.body.appendChild(script);
    } catch (e) {
      cleanup();
      setError('요청 생성 실패: ' + e.message);
      setLoading(false);
    }
  }

  const filteredCategories = useMemo(() => {
    if (!data.investPlan || !data.investPlan.categories) return [];
    return data.investPlan.categories.filter(c => c.name !== '총합' && c.name !== '합계');
  }, [data.investPlan]);

  const pureTotalAmount = useMemo(() => {
    if (!filteredCategories.length) return data.investPlan?.totalAmount || 0;
    const sum = filteredCategories.reduce((acc, c) => acc + (Number(c.currentAmount) || 0), 0);
    return sum > 0 ? sum : (data.investPlan?.totalAmount || 0);
  }, [filteredCategories, data.investPlan]);

  const byAsset = useMemo(() => {
    const map = {};
    if (data.stockHoldings && Array.isArray(data.stockHoldings)) {
      data.stockHoldings.forEach(h => { 
        if (h.asset !== '총합' && h.asset !== '합계') {
          if (!map[h.asset]) map[h.asset] = { value: 0, invested: 0 };
          map[h.asset].value += (Number(h.value) || 0);
          map[h.asset].invested += (Number(h.avgPrice) || Number(h.value) || 0);
        }
      });
    }
    return Object.entries(map).map(([name, v]) => ({ name, value: v.value, invested: v.invested }));
  }, [data.stockHoldings]);

  const totalValue = useMemo(() => byAsset.reduce((s, x) => s + x.value, 0), [byAsset]);
  const totalInvested = useMemo(() => byAsset.reduce((s, x) => s + x.invested, 0), [byAsset]);
  const totalProfitAmount = totalValue - totalInvested;
  const totalProfitRate = totalInvested ? (totalProfitAmount / totalInvested) * 100 : 0;

  const byAssetWithPct = useMemo(() => {
    return byAsset
      .map(a => ({
        ...a,
        pct: totalValue ? (a.value / totalValue) * 100 : 0,
        profitRate: a.invested ? ((a.value - a.invested) / a.invested) * 100 : 0,
      }))
      .sort((a, b) => b.value - a.value);
  }, [byAsset, totalValue]);

  // 세부항목: ETF(상품명)별로 투자원금/평가금액/수익율 집계
  const byName = useMemo(() => {
    const map = {};
    if (data.stockHoldings && Array.isArray(data.stockHoldings)) {
      data.stockHoldings.forEach(h => {
        if (h.asset === '총합' || h.asset === '합계') return;
        const key = h.name || h.asset || '기타';
        if (!map[key]) map[key] = { name: key, asset: h.asset, value: 0, invested: 0 };
        map[key].value += (Number(h.value) || 0);
        map[key].invested += (Number(h.avgPrice) || Number(h.value) || 0);
      });
    }
    return Object.values(map)
      .map(r => ({ ...r, profitRate: r.invested ? ((r.value - r.invested) / r.invested) * 100 : 0 }))
      .sort((a, b) => b.value - a.value);
  }, [data.stockHoldings]);

    return filteredCategories.map(c => ({

      목표: Math.round((Number(c.stage1Target) || 0) * 1000) / 10,
    }));
  }, [filteredCategories]);

    if (!data.investPlan || !data.investPlan.stages) return [];

        row[c.name] = Math.round((Number(c[key]) || 0) * 1000) / 10;

      return row;

        </div>

        {tab === 'stocks' && (

                      <span style={{ color: '#5B5744' }} className="truncate">{a.name}</span>
                    </div>
                    <span className="tabular-nums font-medium flex-shrink-0 flex items-baseline gap-1" style={{ color: INK, fontFamily: 'ui-monospace, monospace' }}>
                      {a.pct.toFixed(1)}%
                      <span style={{ color: a.profitRate >= 0 ? SAGE : RUST, fontSize: '0.65rem' }}>
                        ({a.profitRate >= 0 ? '+' : ''}{a.profitRate.toFixed(1)}%)
                      </span>
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {showDetail && (
              <div className="rounded-2xl p-4" style={{ backgroundColor: PAPER }}>
                <div className="flex items-center justify-between mb-3">
                  <div className="text-sm font-medium" style={{ color: INK }}>세부항목 (ETF별 손익)</div>
                  <button
                    onClick={() => setShowDetail(false)}
                    className="w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold flex-shrink-0"
                    style={{ backgroundColor: INK, color: PAPER }}
                  >
                    ✕
                  </button>
                </div>
                <div className="grid grid-cols-[1fr,auto,auto,auto] gap-x-2 gap-y-2 text-xs">
                  <div style={{ color: MUTED }}>ETF</div>
                  <div className="text-right" style={{ color: MUTED }}>투자원금</div>
                  <div className="text-right" style={{ color: MUTED }}>평가금액</div>
                  <div className="text-right" style={{ color: MUTED }}>수익률</div>
                  {byName.map((r) => (
                    <React.Fragment key={r.name}>
                      <div className="truncate" style={{ color: INK }}>{r.name}</div>
                      <div className="text-right tabular-nums" style={{ color: '#5B5744', fontFamily: 'ui-monospace, monospace' }}>{fmtKRW(r.invested)}</div>
                      <div className="text-right tabular-nums" style={{ color: INK, fontFamily: 'ui-monospace, monospace' }}>{fmtKRW(r.value)}</div>
                      <div className="text-right tabular-nums font-medium" style={{ color: r.profitRate >= 0 ? SAGE : RUST, fontFamily: 'ui-monospace, monospace' }}>
                        {r.profitRate >= 0 ? '+' : ''}{r.profitRate.toFixed(1)}%
                      </div>
                    </React.Fragment>
                  ))}
                </div>
              </div>
            )}

            <div className="rounded-2xl p-4" style={{ backgroundColor: PAPER }}>
              <div className="text-sm font-medium mb-3" style={{ color: INK }}>2026년 현재 vs 목표(1단계)</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={currentVsTarget2026Fixed} barGap={4}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#D8D2C0" vertical={false} />
                  <XAxis dataKey="name" tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} unit="%" />
                  <Tooltip {...tooltipBase} />
                  <Bar dataKey="현재" fill={SAGE} radius={[4, 4, 0, 0]} />
                  <Bar dataKey="목표" fill={GOLD} radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div className="rounded-2xl p-4" style={{ backgroundColor: PAPER }}>
              <div className="text-sm font-medium mb-1" style={{ color: INK }}>글라이드슬롭 (3단계 계획)</div>
              <div className="text-xs mb-3" style={{ color: MUTED }}>2026~29 → 2030~32 → 2033~35, 목표 비중 변화</div>
              <ResponsiveContainer width="100%" height={200}>
                <LineChart data={glideData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#D8D2C0" vertical={false} />
                  <XAxis dataKey="period" tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} unit="%" />
                  <Tooltip {...tooltipBase} />
                  <Legend wrapperStyle={{ fontSize: 11 }} />
                  {filteredCategories.map((c, i) => (
                    <Line key={c.name} type="linear" dataKey={c.name} stroke={PIE_COLORS[c.name] || catColors[i % catColors.length]} strokeWidth={2} dot={{ r: 3 }} />
                  ))}
                </LineChart>
              </ResponsiveContainer>
            </div>

            <div className="rounded-2xl p-4" style={{ backgroundColor: PAPER }}>
              <div className="flex items-center justify-between mb-1">
                <div className="text-sm font-medium" style={{ color: INK }}>몬테카를로 시뮬레이션</div>
                <button
                  onClick={handleRunMonteCarlo}
                  disabled={mcRunning}
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium"
                  style={{ backgroundColor: INK, color: PAPER }}
                >
                  🎲 {mcRunning ? '계산 중...' : mc ? '다시 실행' : '실행'}
                </button>
              </div>
              <div className="text-xs mb-3" style={{ color: MUTED }}>
                2026→2035, 총 {fmtKRW(pureTotalAmount)}원 기준 · 단계별 목표배분 리밸런싱 가정 · 1,500회 시뮬레이션
              </div>

              {!mc && <div className="text-xs py-6 text-center" style={{ color: MUTED }}>"실행"을 눌러 2035년 예상 자산 분포를 계산하세요</div>}

              {mc && (
                <>
                  <ResponsiveContainer width="100%" height={160}>
                    <BarChart data={mc.hist}>
                      <XAxis dataKey="range" tick={{ fill: '#5B5744', fontSize: 9 }} axisLine={false} tickLine={false} interval={2} />
                      <YAxis hide />
                      <Tooltip {...tooltipBase} formatter={(v) => [v + '회', '빈도']} />
                      <Bar dataKey="count" fill={GOLD} radius={[3, 3, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>

                  <div className="grid grid-cols-2 gap-2 mt-3 text-xs" style={{ color: '#5B5744' }}>
                    <div className="rounded-lg p-2" style={{ backgroundColor: '#E5DFCE' }}>
                      <div style={{ color: MUTED }}>중간값(50%)</div>
                      <div className="tabular-nums font-medium" style={{ fontFamily: 'ui-monospace, monospace' }}>{fmtKRW(mc.p50)}원</div>
                    </div>
                    <div className="rounded-lg p-2" style={{ backgroundColor: '#E5DFCE' }}>
                      <div style={{ color: MUTED }}>평균</div>
                      <div className="tabular-nums font-medium" style={{ fontFamily: 'ui-monospace, monospace' }}>{fmtKRW(mc.mean)}원</div>
                    </div>
                    <div className="rounded-lg p-2" style={{ backgroundColor: '#E5DFCE' }}>
                      <div style={{ color: MUTED }}>하위 5% (비관)</div>
                      <div className="tabular-nums font-medium" style={{ fontFamily: 'ui-monospace, monospace', color: RUST }}>{fmtKRW(mc.p5)}원</div>
                    </div>
                    <div className="rounded-lg p-2" style={{ backgroundColor: '#E5DFCE' }}>
                      <div style={{ color: MUTED }}>상위 5% (낙관)</div>
                      <div className="tabular-nums font-medium" style={{ fontFamily: 'ui-monospace, monospace', color: SAGE }}>{fmtKRW(mc.p95)}원</div>
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WealthDashboard />);
</script>
</body>
</html>
